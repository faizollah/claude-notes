<!DOCTYPE html>
<html>
<head>
  <title>Claude Notes Library</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="library.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Claude Notes Library</h1>
      <div class="actions">
        <button id="export-notes">Export Notes</button>
        <button id="clear-all" class="danger">Clear All Notes</button>
      </div>
    </header>
    
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search across all your conversations...">
    </div>
    
    <div class="clips-container" id="clips-container">
      <!-- Notes organized by conversation will be loaded here -->
      <div class="loading">Loading your notes...</div>
    </div>
    
    <div class="empty-state" id="empty-state" style="display: none;">
      <p>No notes found. Select text in Claude.ai and click "Clip" to save notes.</p>
    </div>
    
    <footer>
      <p>Claude Notes - Save and organize your AI conversations</p>
    </footer>
  </div>
  
  <script src="library.js"></script>
</body>
</html>
